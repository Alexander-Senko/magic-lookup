name: CI

on:
  push:
    branches:
      - main
    tags:
      - '!*' # none
    paths:
      - lib/*
      - spec/*
      - Gemfile*
      - '*.gemspec'
      - .github/workflows/ci.yml
      - .rspec*
      - .rubocop*
      - '!**/version.rb'

  pull_request:
    paths:
      - '!*.md'
      - '!*.txt'

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: head
          bundler-cache: true

      - name: Lint code for consistent style
        run: bin/rubocop -f github
        continue-on-error: true

  test:
    runs-on: ubuntu-latest
    name: Ruby ${{ matrix.ruby }}
    permissions:
      id-token: write
    strategy:
      matrix:
        ruby:
          - head
          - 4.0
          - 3.4
          - 3.3
          - 3.2

          - truffleruby
          - truffleruby-head

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version:  ${{ matrix.ruby }}
          bundler-cache: true

      - name: Run specs with code coverage
        run: bundle exec rake
        continue-on-error: ${{ matrix.allow-fail || false }}
        id: test

      - name: Upload coverage to Qlty Cloud
        if:   ${{ matrix.ruby == 'head' && steps.test.outcome == 'success' }}
        uses: qltysh/qlty-action/coverage@v2
        with:
          oidc:   true
          files:  coverage/.resultset.json
          format: simplecov

      - name: Test ${{ steps.test.outcome }}
        run:  ruby -v
